<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>КиївЧорнозем</title>
    <script>
      // SPA redirect trick for GitHub Pages
      // When GitHub Pages returns 404, this page encodes the URL
      // and redirects to index.html which then restores the route.
      // pathSegmentsToKeep=1 because base is /chernozem/
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
