# ═══════════════════════════════════════════════════════════════
#  КиівЧорнозем — GitHub Pages Deploy
#  Автоматично білдить і деплоїть сайт при кожному push у main
# ═══════════════════════════════════════════════════════════════

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # запускається при push у гілку main
  workflow_dispatch:  # дозволяє запустити вручну з GitHub UI

# Потрібні права для деплою на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Запобігає паралельним деплоям — якщо вже є активний, чекає
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      # 1. Чекаємо код з репо
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Встановлюємо pnpm (ваш пакет-менеджер)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 3. Встановлюємо Node.js з кешем pnpm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      # 4. Встановлюємо залежності
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Білдимо сайт (тільки client-build — vite build)
      #    SSR/prerender запускається локально; у CI достатньо SPA-збірки.
      - name: Build site
        run: pnpm build:client

      # 6. Копіюємо index.html → 404.html
      #    GitHub Pages повертає 404.html якщо шлях не знайдено.
      #    Це дозволяє React Router обробити /admin та інші маршрути.
      - name: Create 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      # 7. Налаштовуємо GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 8. Завантажуємо артефакт для деплою
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4