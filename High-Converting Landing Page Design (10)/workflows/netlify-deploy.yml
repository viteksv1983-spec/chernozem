# ═══════════════════════════════════════════════════════════════
#  КиіЧорнозем — Netlify Deploy через GitHub Actions
#  Використовуйте цей файл ЗАМІСТЬ deploy.yml якщо деплоїте
#  на Netlify (рекомендовано — є redirects та кешування).
#
#  Потрібно додати секрети в GitHub репо:
#  Settings → Secrets and variables → Actions → New secret:
#    NETLIFY_AUTH_TOKEN  — Personal access token з netlify.com/user/applications
#    NETLIFY_SITE_ID     — Site ID з Netlify: Site settings → General → Site ID
# ═══════════════════════════════════════════════════════════════

name: Deploy to Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: dist
          production-branch: main
          production-deploy: true
          deploy-message: "Deploy from GitHub Actions — ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
