    <script>
      // SPA redirect trick for GitHub Pages — restores the encoded route
      // from 404.html redirect back into window.history before React mounts.
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>

      // bypasses GitHub Pages Cache-Control: max-age=600 limitation.
      // Admin route is excluded from SW interception (always fresh).

        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/chernozem/sw.js', { scope: '/chernozem/' })
            .catch(function () {
              // SW registration is a progressive enhancement — silent fail is OK
            });
